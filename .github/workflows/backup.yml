name: Backup Automático - Excel por Correo

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install pandas openpyxl psycopg2-binary

      - name: Generar Excel y enviar correo
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python -c "
          import pandas as pd
          import psycopg2
          from datetime import datetime
          import os
          import socket
          import smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders

          print('🔌 Conectando a Supabase...')

          try:
              conn = psycopg2.connect(
                  host=os.environ['SUPABASE_HOST'],
                  port=os.environ['SUPABASE_PORT'],
                  database=os.environ['SUPABASE_DB'],
                  user=os.environ['SUPABASE_USER'],
                  password=os.environ['SUPABASE_PASSWORD'],
                  sslmode='require',
                  connect_timeout=30
              )
              print('✅ Conexión exitosa')
          except Exception as e:
              print(f'⚠️ Error de conexión: {e}')
              hostname = os.environ['SUPABASE_HOST']
              ipv4 = socket.gethostbyname(hostname)
              print(f'📍 Resolviendo {hostname} -> {ipv4}')
              conn = psycopg2.connect(
                  host=ipv4,
                  port=os.environ['SUPABASE_PORT'],
                  database=os.environ['SUPABASE_DB'],
                  user=os.environ['SUPABASE_USER'],
                  password=os.environ['SUPABASE_PASSWORD'],
                  sslmode='require',
                  connect_timeout=30
              )
              print('✅ Conexión exitosa (IPv4 directo)')

          print('📊 Leyendo herramientas...')
          df_herramientas = pd.read_sql('SELECT * FROM herramientas ORDER BY nombre', conn)
          print(f'✅ {len(df_herramientas)} herramientas encontradas')

          print('📊 Leyendo movimientos...')
          df_movimientos = pd.read_sql('''
              SELECT h.nombre AS Herramienta, m.usuario AS Usuario,
                     m.cantidad AS Cantidad,
                     m.fecha_prestamo AS Fecha_Prestamo,
                     m.fecha_devolucion AS Fecha_Devolucion
              FROM movimientos m
              JOIN herramientas h ON m.herramienta_id = h.id
              ORDER BY m.fecha_prestamo DESC
          ''', conn)
          print(f'✅ {len(df_movimientos)} movimientos encontrados')

          conn.close()

          # Crear Excel
          fecha = datetime.now().strftime('%Y-%m-%d')
          hora = datetime.now().strftime('%H:%M:%S')
          filename = f'backup_bitacora_{fecha}.xlsx'

          with pd.ExcelWriter(filename, engine='openpyxl') as writer:
              df_herramientas.to_excel(writer, sheet_name='Inventario', index=False)
              df_movimientos.to_excel(writer, sheet_name='Historial', index=False)

          print(f'✅ Backup creado: {filename}')

          # ============================================================
          # ENVIAR CORREO CON EL EXCEL ADJUNTO USANDO smtplib
          # ============================================================
          print('📧 Enviando correo...')

          # Configurar correo
          remitente = os.environ['EMAIL_FROM']
          destinatario = os.environ['EMAIL_TO']
          password = os.environ['EMAIL_PASSWORD']

          msg = MIMEMultipart()
          msg['From'] = remitente
          msg['To'] = destinatario
          msg['Subject'] = f'📊 Respaldo Bitácora - {fecha}'

          # Cuerpo del correo
          cuerpo = f"""
  📊 Respaldo de Bitácora de Herramientas

  Fecha: {fecha} {hora}

  Herramientas: {len(df_herramientas)}
  Movimientos: {len(df_movimientos)}

  Se adjunta el archivo Excel con toda la información.
          """
          msg.attach(MIMEText(cuerpo, 'plain'))

          # Adjuntar archivo Excel
          with open(filename, 'rb') as adjunto:
              parte = MIMEBase('application', 'octet-stream')
              parte.set_payload(adjunto.read())
              encoders.encode_base64(parte)
              parte.add_header(
                  'Content-Disposition',
                  f'attachment; filename={filename}'
              )
              msg.attach(parte)

          # Enviar correo
          try:
              server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
              server.login(remitente, password)
              server.sendmail(remitente, destinatario, msg.as_string())
              server.quit()
              print('✅ Correo enviado exitosamente')
          except Exception as e:
              print(f'❌ Error al enviar correo: {e}')
              raise e
          "
