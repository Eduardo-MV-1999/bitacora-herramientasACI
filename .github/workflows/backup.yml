name: Backup Automático - Excel por Correo

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install pandas openpyxl psycopg2-binary

      - name: Generar Excel de respaldo
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          python -c "
          import pandas as pd
          import psycopg2
          from datetime import datetime
          import os
          import socket

          print('🔌 Conectando a Supabase (forzando IPv4)...')

          # Forzar a usar IPv4 en la conexión
          # Esta es la solución clave para el error "Network is unreachable"
          try:
              # Intentar conectar usando hostaddr (IPv4)
              conn = psycopg2.connect(
                  host=os.environ['SUPABASE_HOST'],
                  port=os.environ['SUPABASE_PORT'],
                  database=os.environ['SUPABASE_DB'],
                  user=os.environ['SUPABASE_USER'],
                  password=os.environ['SUPABASE_PASSWORD'],
                  sslmode='require',
                  connect_timeout=30
              )
              print('✅ Conexión exitosa')
          except Exception as e:
              print(f'❌ Error de conexión: {e}')
              # Si falla, intentar con hostaddr (IPv4 directo)
              import socket
              try:
                  # Obtener la IP del host
                  hostname = os.environ['SUPABASE_HOST']
                  ipv4 = socket.gethostbyname(hostname)
                  print(f'📍 Resolviendo {hostname} -> {ipv4}')
                  conn = psycopg2.connect(
                      host=ipv4,
                      port=os.environ['SUPABASE_PORT'],
                      database=os.environ['SUPABASE_DB'],
                      user=os.environ['SUPABASE_USER'],
                      password=os.environ['SUPABASE_PASSWORD'],
                      sslmode='require',
                      connect_timeout=30
                  )
                  print('✅ Conexión exitosa (usando IPv4 directo)')
              except Exception as e2:
                  print(f'❌ Error al conectar por IPv4: {e2}')
                  raise e2

          print('📊 Leyendo herramientas...')
          df_herramientas = pd.read_sql('SELECT * FROM herramientas ORDER BY nombre', conn)
          print(f'✅ {len(df_herramientas)} herramientas encontradas')

          print('📊 Leyendo movimientos...')
          df_movimientos = pd.read_sql('''
              SELECT h.nombre AS Herramienta, m.usuario AS Usuario,
                     m.cantidad AS Cantidad,
                     m.fecha_prestamo AS Fecha_Prestamo,
                     m.fecha_devolucion AS Fecha_Devolucion
              FROM movimientos m
              JOIN herramientas h ON m.herramienta_id = h.id
              ORDER BY m.fecha_prestamo DESC
          ''', conn)
          print(f'✅ {len(df_movimientos)} movimientos encontrados')

          conn.close()

          fecha = datetime.now().strftime('%Y-%m-%d_%H-%M')
          filename = f'backup_bitacora_{fecha}.xlsx'

          with pd.ExcelWriter(filename, engine='openpyxl') as writer:
              df_herramientas.to_excel(writer, sheet_name='Inventario', index=False)
              df_movimientos.to_excel(writer, sheet_name='Historial', index=False)

          with open('conteos.txt', 'w') as f:
              f.write(f'Herramientas: {len(df_herramientas)}\n')
              f.write(f'Movimientos: {len(df_movimientos)}\n')

          print(f'✅ Backup creado: {filename}')
          "

      - name: Enviar correo con el respaldo
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "📊 Respaldo Bitácora - $(date +'%Y-%m-%d')"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: |
            📊 Respaldo de Bitácora de Herramientas

            Fecha: $(date +'%Y-%m-%d %H:%M:%S')

            $(cat conteos.txt)

            Se adjunta el archivo Excel con toda la información.
          attachments: backup_bitacora_*.xlsx
          content_type: text/plain
