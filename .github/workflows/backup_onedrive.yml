name: Backup a OneDrive

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install pandas openpyxl psycopg2-binary msal requests

      - name: Generar Excel y subir a OneDrive
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_TENANT_ID: ${{ secrets.ONEDRIVE_TENANT_ID }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
        run: |
          python -c "
          import pandas as pd
          import psycopg2
          from datetime import datetime
          import os
          import socket
          import msal
          import requests
          import re

          print('🔌 Conectando a Supabase...')

          # Obtener hostname y limpiarlo de caracteres invisibles
          hostname_raw = os.environ.get('SUPABASE_HOST', '')
          print(f'📡 Hostname RAW (longitud: {len(hostname_raw)}): [{hostname_raw}]')
          
          # Limpiar: eliminar espacios, saltos de línea, comillas, etc.
          hostname = re.sub(r'[\s"\']', '', hostname_raw)
          print(f'📡 Hostname LIMPIO (longitud: {len(hostname)}): [{hostname}]')

          if not hostname:
              raise ValueError('❌ SUPABASE_HOST está vacío después de limpiar')

          # Verificar que el hostname tenga el formato correcto
          if not hostname.endswith('supabase.co'):
              print(f'⚠️ El hostname no termina en supabase.co: {hostname}')
              print('   Verifica que el secreto sea correcto')
              raise ValueError('Hostname inválido')

          # Resolver IPv4
          try:
              ipv4 = socket.gethostbyname(hostname)
              print(f'📍 Resuelto: {hostname} -> {ipv4}')
          except socket.gaierror as e:
              print(f'❌ Error al resolver: {e}')
              print('   Posibles causas:')
              print('   1. El hostname tiene caracteres invisibles')
              print('   2. El hostname es incorrecto')
              print('   3. No hay conexión a Internet')
              raise

          # Conectar a Supabase
          try:
              conn = psycopg2.connect(
                  host=ipv4,
                  port=os.environ['SUPABASE_PORT'],
                  database=os.environ['SUPABASE_DB'],
                  user=os.environ['SUPABASE_USER'],
                  password=os.environ['SUPABASE_PASSWORD'],
                  sslmode='require',
                  connect_timeout=30
              )
              print('✅ Conexión exitosa')
          except Exception as e:
              print(f'❌ Error de conexión: {e}')
              raise

          # Leer datos
          print('📊 Leyendo herramientas...')
          df_herramientas = pd.read_sql('SELECT * FROM herramientas ORDER BY nombre', conn)
          print(f'✅ {len(df_herramientas)} herramientas')

          print('📊 Leyendo movimientos...')
          df_movimientos = pd.read_sql('''
              SELECT h.nombre AS Herramienta, m.usuario AS Usuario,
                     m.cantidad AS Cantidad,
                     m.fecha_prestamo AS Fecha_Prestamo,
                     m.fecha_devolucion AS Fecha_Devolucion
              FROM movimientos m
              JOIN herramientas h ON m.herramienta_id = h.id
              ORDER BY m.fecha_prestamo DESC
          ''', conn)
          print(f'✅ {len(df_movimientos)} movimientos')

          print('📊 Leyendo usuarios...')
          df_usuarios = pd.read_sql('SELECT * FROM usuarios ORDER BY nombre', conn)
          print(f'✅ {len(df_usuarios)} usuarios')

          conn.close()

          # Crear Excel
          fecha = datetime.now().strftime('%Y-%m-%d')
          filename = f'backup_bitacora_{fecha}.xlsx'

          with pd.ExcelWriter(filename, engine='openpyxl') as writer:
              df_herramientas.to_excel(writer, sheet_name='Inventario', index=False)
              df_movimientos.to_excel(writer, sheet_name='Historial', index=False)
              df_usuarios.to_excel(writer, sheet_name='Usuarios', index=False)

          print(f'✅ Backup creado: {filename}')

          # Autenticar en Microsoft Graph
          print('🔑 Autenticando en Microsoft Graph...')

          app = msal.PublicClientApplication(
              os.environ['ONEDRIVE_CLIENT_ID'],
              authority=f'https://login.microsoftonline.com/{os.environ["ONEDRIVE_TENANT_ID"]}'
          )

          result = app.acquire_token_by_refresh_token(
              os.environ['ONEDRIVE_REFRESH_TOKEN'],
              scopes=['Files.ReadWrite', 'User.Read']
          )

          if 'access_token' not in result:
              error = result.get('error', 'Error desconocido')
              desc = result.get('error_description', '')
              raise Exception(f'Error de autenticación: {error} - {desc}')

          access_token = result['access_token']
          print('✅ Autenticación exitosa')

          # Subir a OneDrive
          print('📤 Subiendo archivo a OneDrive...')

          headers = {
              'Authorization': f'Bearer {access_token}',
              'Content-Type': 'application/json'
          }

          # Crear carpeta si no existe
          folder_url = 'https://graph.microsoft.com/v1.0/me/drive/root/children'
          folder_data = {'name': 'Backup_Bitacora', 'folder': {}}
          requests.post(folder_url, headers=headers, json=folder_data)

          # Crear sesión de upload
          upload_url = 'https://graph.microsoft.com/v1.0/me/drive/root:/Backup_Bitacora/:/createUploadSession'
          session_response = requests.post(upload_url, headers=headers, json={
              'item': {'name': filename}
          })

          if session_response.status_code != 200:
              print(f'⚠️ Error al crear sesión: {session_response.status_code}')
              print(session_response.text)
              raise Exception('No se pudo crear sesión de upload')

          upload_url = session_response.json().get('uploadUrl')

          if upload_url:
              with open(filename, 'rb') as f:
                  file_content = f.read()

              upload_response = requests.put(upload_url, data=file_content, headers={
                  'Content-Range': f'bytes 0-{len(file_content)-1}/{len(file_content)}'
              })

              if upload_response.status_code in [200, 201]:
                  print(f'✅ Archivo subido exitosamente a OneDrive: {filename}')
              else:
                  print(f'❌ Error al subir: {upload_response.status_code}')
                  print(upload_response.text)
                  raise Exception('Error al subir archivo')
          else:
              raise Exception('No se obtuvo URL de upload')

          print('🎉 Proceso completado exitosamente!')
          "
