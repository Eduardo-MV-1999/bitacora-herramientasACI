name: Keep Alive - Despertar Supabase

on:
  schedule:
    # ⏰ Ejecutar cada 6 horas (ajusta si quieres)
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Hacer ping a la app
        run: |
          # 🔧 URL DE TU APP (sin barra al final)
          APP_URL="https://bitacora-herramientas-aci-v1.streamlit.app"
          
          echo "🔄 Manteniendo activa la app en: $APP_URL"
          
          # Usar el endpoint de salud interno de Streamlit
          HEALTH_URL="${APP_URL}/_stcore/health"
          
          echo "📡 Verificando salud en: $HEALTH_URL"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$HEALTH_URL")
          
          echo "✅ Código de respuesta del health check: $RESPONSE"
          
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ App activa y saludable"
            exit 0
          else
            echo "⚠️ Health check respondió con $RESPONSE. Intentando con la URL principal..."
            
            # Fallback: intentar con la URL principal
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$APP_URL")
            echo "✅ Código de respuesta de la app: $RESPONSE"
            
            # 200, 302, 301, 403 son códigos que indican que la app está viva
            if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "302" ] || [ "$RESPONSE" = "301" ] || [ "$RESPONSE" = "403" ]; then
              echo "✅ App está respondiendo (código $RESPONSE)"
              exit 0
            else
              echo "⚠️ La app respondió con $RESPONSE, pero se considera un warning, no un error."
              exit 0
            fi
          fi
