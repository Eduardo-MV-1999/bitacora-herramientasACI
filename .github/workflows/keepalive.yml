name: Keep Alive - Despertar Supabase

on:
  schedule:
    # ⏰ Ejecutar cada 6 horas (edita si quieres)
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Hacer ping a la app
        run: |
          # 🔧 CAMBIA ESTA URL POR LA DE TU APP EN STREAMLIT CLOUD
          APP_URL="https://bitacora-herramientas-aci.streamlit.app"
          
          echo "🔄 Haciendo ping a $APP_URL..."
          
          # Intentar con curl con timeout y seguir redirecciones
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 -L $APP_URL)
          
          echo "✅ Respuesta: $RESPONSE"
          
          if [ $RESPONSE -eq 200 ] || [ $RESPONSE -eq 302 ] || [ $RESPONSE -eq 301 ]; then
            echo "✅ App activa y respondiendo"
            exit 0
          else
            echo "⚠️ La app respondió con código $RESPONSE"
            # No fallamos el workflow, solo advertimos
            exit 0
          fi
